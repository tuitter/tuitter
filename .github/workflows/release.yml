on:
  push:
    tags:
      - "v*"
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-executables:
    name: Build PyInstaller single-file binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            osname: linux-x86_64
            artifact: tuitter-linux-x86_64
          - os: macos-13          # Intel x86_64
            osname: macos-x86_64
            artifact: tuitter-macos-x86_64
          - os: macos-latest      # Apple Silicon arm64
            osname: macos-arm64
            artifact: tuitter-macos-arm64
          - os: windows-latest
            osname: windows-x86_64
            artifact: tuitter-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller and package
        run: |
          python -m pip install --upgrade pip pyinstaller
          python -m pip install .

      - name: Build single-file executable
        run: pyinstaller --onefile --name tuitter tuitter/main.py

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release_artifacts
          cp dist/tuitter release_artifacts/${{ matrix.artifact }}
          chmod +x release_artifacts/${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item dist\tuitter.exe release_artifacts\${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          name: ${{ github.ref_type == 'tag' && format('tuitter {0}', github.ref_name) || 'tuitter dev build' }}
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref_name, '-') }}
          make_latest: ${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
          files: release_artifacts/${{ matrix.artifact }}
